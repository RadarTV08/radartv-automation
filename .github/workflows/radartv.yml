name: RadarTV

on:
  workflow_dispatch:

jobs:
  run:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - run: pip install requests

      - run: python scripts/main.py
        env:
          APIFY_TOKEN: ${{ secrets.APIFY_TOKEN }}
