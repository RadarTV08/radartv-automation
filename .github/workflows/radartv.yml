name: RadarTV

on:
  schedule:
    - cron: '0 9 * * *'  # 06h Brasil aproximadamente
  workflow_dispatch:

jobs:
  run:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - run: python scripts/main.py
